          <path d="M12 3V21" stroke="#09B5E2" stroke-width="1.4" opacity="0.7"/>
          <path d="M5 7L12 11L19 7" stroke="#09B5E2" stroke-width="1.4" opacity="0.7" />
          <path d="M7 4.5C5.5 5.2 4.4 6.4 3.8 8" stroke="#FFFFFF" stroke-width="1.8" stroke-linecap="round" />
          <path d="M3.5 5.8L3.8 8.3L6.2 7.6" stroke="#FFFFFF" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />

          <circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/>
        </svg>
        Información

      <button id="url-ruta" type="button" onclick="buttonRuta()"

  <script>
    //alert("Nota: No traduzcas la página.");
    //alert("Nota: Si la página presenta algún problema, retrocede o cierra la página y vuelve a entrar.");
    function toggleArea(areaName) {
      /**
       * Muestra/Oculta los marcadores que se encuentran dentro del
       * 'areaName'.
       * 
       * Leaflet ofrece su propio elemento que permite mostrar u ocultar los
       * grupos de marcadores. Este elemento se mostraría (se modificó para que
       * siempre esté oculto y no visible) al hacer hover sobre
       * el elemento 'a' con la clase 'leaflet-control-layers-toggle'. Este
       * control personalizado únicamente modifica por medio del DOM dicho 
       * elemento, activando y desactivando unos checkboxes en el control 
       * original, dependiendo de si el checkbox correspondiente a un área está
       * activado o no es que se muestra en el mapa. 'areaName' debe ser el
       * mismo nombre que se asignó en overlays.js para que funcione 
       * correctamente.
       */
      const inputs = controlLayers._layerControlInputs;

      for (let i = inputs.length - 1; i >= 0; i--) {
        input = inputs[i];

        // Básicamente, se obtiene el nombre en el checkbox original.
        inputName = inputs[i].labels[0].innerText.trimStart();

        // inputName debe ser igual al nombre que se le asignó al área en 
        // overlays.js
        if (inputName == areaName) {
          input.checked = !input.checked;
        }
      }
      controlLayers._onInputClick();
      submenu(areaName);
      console.log(areaName);
    }

  </script>
